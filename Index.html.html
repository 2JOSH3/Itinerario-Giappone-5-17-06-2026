<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🗾 Giappone 2026</title>
<style>
:root{--bg:#121212;--ink:#1E1E1E;--card:#252525;--text:#F0F0F0;--sub:#909090;--red:#C62828;--border:#333;--yellow:#FFB74D}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;height:100dvh;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto}
.view{display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden}
/* CITY TABS */
#city-tabs{display:flex;gap:4px;padding:8px 8px 4px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;background:var(--bg)}
#city-tabs::-webkit-scrollbar{display:none}
.ctab{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:700;cursor:pointer;color:var(--sub);background:var(--ink);white-space:nowrap;line-height:1.4}
.ctab.on{color:#fff}
/* MAP */
#map-area{flex-shrink:0;position:relative;background:var(--ink);border-bottom:1px solid var(--border)}
#svgmap{width:100%;height:175px;display:block}
#gmapsbtn{position:absolute;bottom:8px;right:8px;background:#4285F4;color:#fff;padding:5px 12px;border-radius:14px;font-size:11px;font-weight:700;text-decoration:none}
/* DAY PILLS */
#dpills{display:flex;gap:4px;padding:7px 8px 4px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
#dpills::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;padding:5px 10px;border-radius:14px;border:1px solid var(--border);font-size:11px;cursor:pointer;color:var(--sub);background:var(--ink);line-height:1.4;text-align:center}
.dpill.on{color:#fff}
/* DAY CARDS */
#dcards{flex:1;overflow-y:auto;padding:8px}
.day-header{font-size:11px;color:var(--sub);padding:2px 0 8px;font-weight:600}
.act{background:var(--card);border-radius:12px;padding:11px 12px;margin-bottom:7px}
.act-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.act-time{font-size:11px;color:var(--sub)}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.b-free{background:#1B5E20;color:#A5D6A7}
.b-cost{background:#1A237E;color:#90CAF9}
.b-warn{background:#B71C1C;color:#FFCDD2}
.act-name{font-size:14px;font-weight:700;margin-bottom:2px}
.act-desc{font-size:12px;color:var(--sub);line-height:1.4}
.act-tip{font-size:11px;color:#FFB74D;margin-top:4px}
.tr{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;margin:2px 0;font-size:11px;font-weight:500}
.day-bud{background:var(--ink);border-radius:10px;padding:9px 12px;margin-top:5px;font-size:12px}
.day-bud b{color:var(--yellow)}
.day-tip{background:var(--ink);border-radius:10px;padding:8px 12px;margin-top:4px;font-size:11px;color:#80DEEA;font-style:italic}
/* SURPRISE */
.surprise{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;gap:14px;min-height:340px}
.s-heart{font-size:56px;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
/* CIBO */
#cibo-view{overflow:hidden}
.cibo-tabs{display:flex;gap:4px;padding:8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;background:var(--bg)}
.cibo-tabs::-webkit-scrollbar{display:none}
.ctab2{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:700;cursor:pointer;color:var(--sub);background:var(--ink)}
.ctab2.on{color:#fff}
#cibo-body{flex:1;overflow-y:auto;padding:8px}
.c-intro{background:var(--card);border-radius:10px;padding:11px 12px;font-size:12px;color:var(--sub);margin-bottom:8px;font-style:italic;line-height:1.4}
.c-cat{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.6px;text-transform:uppercase;margin:11px 0 6px 2px}
.c-item{background:var(--card);border-radius:10px;padding:10px 12px;margin-bottom:5px}
.c-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.c-name{font-size:13px;font-weight:700}
.c-price{font-size:11px;font-weight:700;color:var(--yellow)}
.c-desc{font-size:12px;color:var(--sub);line-height:1.4}
.c-tip{font-size:11px;color:#80DEEA;margin-top:3px}
/* BUDGET */
#budget-view{overflow-y:auto;padding:8px}
.bv-h{font-size:16px;font-weight:800;padding:6px 4px 12px}
.bv-tot{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;text-align:center}
.bv-tot-l{font-size:12px;color:var(--sub)}
.bv-tot-v{font-size:28px;font-weight:800;color:var(--yellow);margin:4px 0 2px}
.bv-tot-s{font-size:11px;color:var(--sub)}
.bv-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.bv-cell{background:var(--card);border-radius:10px;padding:10px 8px;text-align:center}
.bv-cl{font-size:10px;color:var(--sub);margin-bottom:3px}
.bv-cv{font-size:15px;font-weight:700;color:var(--yellow)}
.bv-cs{font-size:9px;color:var(--sub);margin-top:2px}
.bv-sec{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.6px;text-transform:uppercase;margin:12px 0 5px 4px}
.bv-row{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;background:var(--card);border-radius:8px;margin-bottom:3px;font-size:12px;gap:8px}
.bv-row span:last-child{font-weight:700;color:var(--yellow);flex-shrink:0}
.sc{background:var(--card);border-radius:10px;padding:10px 12px;margin-bottom:6px;border-left:3px solid #2E7D32}
.sc-h{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.sc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sc-t{font-size:12px;font-weight:700}
.sc-v{font-size:20px;font-weight:800;color:var(--yellow)}
.sc-d{font-size:11px;color:var(--sub);line-height:1.4}
.tip-box{background:var(--ink);border-radius:10px;padding:12px;font-size:12px;color:#4FC3F7;margin-top:4px;line-height:1.5}
/* INFO */
#info-view{overflow-y:auto;padding:8px}
.iv-h{font-size:16px;font-weight:800;padding:6px 4px 12px}
.icard{background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px}
.icard-t{font-size:13px;font-weight:800;margin-bottom:8px;color:var(--yellow)}
.ir{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);line-height:1.4}
.ir:last-child{border-bottom:none}
.ik{font-size:11px;font-weight:700;color:var(--sub);min-width:76px;flex-shrink:0;padding-top:1px}
.iv{font-size:12px;flex:1;line-height:1.4}
.wi{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;line-height:1.5}
.wi:last-child{border-bottom:none}
/* BOTTOM NAV */
.bnav{display:flex;background:var(--ink);border-top:1px solid var(--border);flex-shrink:0}
.nb{flex:1;padding:8px 2px 6px;border:none;background:transparent;color:var(--sub);font-size:9px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.nb.on{color:#fff}
.ni{font-size:18px;line-height:1}
</style>
</head>

// ── MAP FILTER ─────────────────────────────────────────────────────────────
function getMapPts(day){
 var skip=['rientro','check-out','check out','check-in',"n'ex",'shinkansen','decollo',
  'atterraggio','ultima colazione','ultima sera','ultima chance','cena di addio',
  'jr kyoto','jr nara','jr osaka','narita airport','arrivo milano','hotel vicino nrt',
  'colazione al','deposita'];
 var seen={};
 return day.acts.filter(function(a){
  if(!a.lat||a._t) return false;
  var nl=a.name.toLowerCase();
  for(var i=0;i<skip.length;i++){if(nl.indexOf(skip[i])>=0) return false;}
  var k=Math.round(a.lat*1000)+','+Math.round(a.lng*1000);
  if(seen[k]) return false;
  seen[k]=true;
  return true;
 });
}

// ── SVG MAP ────────────────────────────────────────────────────────────────
function buildSVG(day){
 if(day.city==='hakone'){
  return '<svg viewBox="0 0 300 175" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:175px;background:#1a0a0a">'
   +'<rect width="300" height="175" fill="#1a0a0a"/>'
   +'<text x="150" y="75" text-anchor="middle" font-size="48" font-family="sans-serif">💝</text>'
   +'<text x="150" y="108" text-anchor="middle" fill="#C62828" font-size="14" font-weight="700" font-family="sans-serif">Sorpresa per Minnie</text>'
   +'<text x="150" y="128" text-anchor="middle" fill="#666" font-size="11" font-family="sans-serif">10–11 Giugno 2026</text>'
   +'</svg>';
 }
 var pts=getMapPts(day);
 var col=day.color||'#1565C0';
 var W=300,H=175;
 if(!pts.length){
  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:'+H+'px;background:#12122a">'
   +'<text x="150" y="92" text-anchor="middle" fill="#555" font-size="12" font-family="sans-serif">—</text></svg>';
 }
 var lats=pts.map(function(p){return p.lat;}),lngs=pts.map(function(p){return p.lng;});
 var minLat=Math.min.apply(null,lats),maxLat=Math.max.apply(null,lats);
 var minLng=Math.min.apply(null,lngs),maxLng=Math.max.apply(null,lngs);
 var pad=26;
 var latR=maxLat-minLat||0.008,lngR=maxLng-minLng||0.008;
 var sc=Math.min((W-2*pad)/lngR,(H-2*pad)/latR)*0.78;
 var cx=(minLng+maxLng)/2,cy=(minLat+maxLat)/2;
 function toX(lng){return W/2+(lng-cx)*sc;}
 function toY(lat){return H/2-(lat-cy)*sc;}
 var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:'+H+'px">';
 svg+='<rect width="'+W+'" height="'+H+'" fill="#12122a"/>';
 for(var g=0;g<=8;g++){
  svg+='<line x1="'+(g*W/8)+'" y1="0" x2="'+(g*W/8)+'" y2="'+H+'" stroke="#1c1c3a" stroke-width="1"/>';
  svg+='<line x1="0" y1="'+(g*H/8)+'" x2="'+W+'" y2="'+(g*H/8)+'" stroke="#1c1c3a" stroke-width="1"/>';
 }
 if(pts.length>1){
  var d='M';
  pts.forEach(function(p,i){d+=(i?'L':'')+Math.round(toX(p.lng))+','+Math.round(toY(p.lat));});
  svg+='<path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="2.5" stroke-dasharray="6,4" opacity=".65"/>';
 }
 pts.forEach(function(p,i){
  var x=Math.round(toX(p.lng)),y=Math.round(toY(p.lat));
  var nm=p.name.replace(/ ⭐.*/,'').replace(/ —.*/,'').replace(/ \(.*/,'');
  if(nm.length>20) nm=nm.substring(0,18)+'…';
  var r=12;
  svg+='<circle cx="'+(x+1)+'" cy="'+(y+1)+'" r="'+r+'" fill="rgba(0,0,0,.2)"/>';
  svg+='<circle cx="'+x+'" cy="'+y+'" r="'+r+'" fill="'+col+'" stroke="#fff" stroke-width="2"/>';
  svg+='<text x="'+x+'" y="'+(y+4)+'" text-anchor="middle" fill="#fff" font-size="10" font-weight="700" font-family="sans-serif">'+(i+1)+'</text>';
  var right=x<W*0.62;
  var lx=right?x+r+4:x-r-4,anchor=right?'start':'end';
  var aw=nm.length*5.2+6;
  var bx=right?lx-3:lx-aw+3;
  svg+='<rect x="'+bx+'" y="'+(y-10)+'" width="'+aw+'" height="13" rx="3" fill="rgba(255,255,255,.85)"/>';
  svg+='<text x="'+lx+'" y="'+y+'" text-anchor="'+anchor+'" fill="'+col+'" font-size="9" font-weight="600" font-family="sans-serif">'+nm+'</text>';
 });
 svg+='</svg>';
 return svg;
}

// ── GOOGLE MAPS URL ─────────────────────────────────────────────────────────
function gmapsUrl(day){
 if(day.city==='hakone') return 'https://maps.google.com/?q=35.2319,139.1065';
 var pts=getMapPts(day);
 if(!pts.length) return '#';
 if(pts.length===1) return 'https://www.google.com/maps/search/?api=1&query='+pts[0].lat+','+pts[0].lng;
 var o=pts[0].lat+','+pts[0].lng,d=pts[pts.length-1].lat+','+pts[pts.length-1].lng;
 var mid=pts.slice(1,-1).slice(0,7).map(function(p){return p.lat+','+p.lng;}).join('|');
 var url='https://www.google.com/maps/dir/?api=1&origin='+o+'&destination='+d+'&travelmode=transit';
 if(mid) url+='&waypoints='+encodeURIComponent(mid);
 return url;
}

function renderCibo(){
 var tabs=document.getElementById('cibo-tabs');
 tabs.innerHTML=CIBO.map(function(c){
  var on=c.id===curCibo;
  return '<button class="ctab2'+(on?' on':'')+'" onclick="selCibo(\''+c.id+'\')" style="'+(on?'background:'+c.color+';border-color:'+c.color:'')+'">'+c.em+' '+c.name+'</button>';
 }).join('');
 renderCiboBody();
}

function selCibo(id){
 curCibo=id;
 document.querySelectorAll('.ctab2').forEach(function(b,i){
  var on=CIBO[i].id===id;
  b.classList.toggle('on',on);
  b.style.background=on?CIBO[i].color:'';
  b.style.borderColor=on?CIBO[i].color:'';
 });
 renderCiboBody();
}

function renderCiboBody(){
 var city=CIBO.filter(function(c){return c.id===curCibo;})[0];
 if(!city) return;
 var el=document.getElementById('cibo-body');
 var h='<div class="c-intro">'+city.intro+'</div>';
 city.cats.forEach(function(cat){
  h+='<div class="c-cat">'+cat.n+'</div>';
  cat.items.forEach(function(item){
   h+='<div class="c-item"><div class="c-row"><div class="c-name">'+item.n+'</div><div class="c-price">'+item.p+'</div></div>'
    +'<div class="c-desc">'+item.d+'</div>'
    +(item.tip?'<div class="c-tip">💡 '+item.tip+'</div>':'')
    +'</div>';
  });
 });
 el.innerHTML=h;
}

// ── TAB SWITCH ─────────────────────────────────────────────────────────────
function switchTab(tab){
 ['main','cibo','budget','info'].forEach(function(t){
  document.getElementById(t+'-view').style.display='none';
  document.getElementById('nav-'+t).classList.remove('on');
 });
 document.getElementById(tab+'-view').style.display='flex';
 document.getElementById('nav-'+tab).classList.add('on');
 if(tab==='cibo') renderCibo();
 if(tab==='budget') renderBudget();
 if(tab==='info') renderInfo();
}
